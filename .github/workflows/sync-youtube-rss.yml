name: Sync YouTube RSS

on:
  schedule:
    # UTC 00:00 = KST 09:00
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync RSS → CSV → build → log (retry on failure)
        run: |
          set -e
          attempt=1
          max=3
          while [ "$attempt" -le "$max" ]; do
            echo "=== Pipeline attempt ${attempt}/${max} ==="
            if python scripts/sync-youtube-rss.py \
               && python build-videos.py \
               && python scripts/record-upload-log.py; then
              break
            fi
            if [ "$attempt" -eq "$max" ]; then
              echo "Pipeline failed after ${max} attempts."
              exit 1
            fi
            wait_sec=$((attempt * 90))
            echo "Pipeline failed, retrying in ${wait_sec}s..."
            sleep "$wait_sec"
            attempt=$((attempt + 1))
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HanbitMethodistChurch_Videos.csv data/config.json data/upload-log.json
          if git diff --staged --quiet; then
            echo "No CSV changes — skipping commit."
          else
            git commit -m "chore: sync YouTube videos from RSS"
            git push
          fi
