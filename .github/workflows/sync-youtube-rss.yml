name: Sync YouTube RSS

on:
  schedule:
    # UTC 00:00 = KST 09:00
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync RSS → CSV
        run: python scripts/sync-youtube-rss.py

      - name: Validate video build
        run: python build-videos.py

      - name: Record upload log
        run: python scripts/record-upload-log.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HanbitMethodistChurch_Videos.csv data/config.json data/upload-log.json
          if git diff --staged --quiet; then
            echo "No CSV changes — skipping commit."
          else
            git commit -m "chore: sync YouTube videos from RSS"
            git push
          fi
